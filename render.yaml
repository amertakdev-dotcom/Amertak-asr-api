services:
  - type: web
    name: khmer-asr-api
    runtime: node
    plan: standard
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DEFAULT_BACKEND
        value: hf-api
      - key: HF_API_MODEL
        value: ksoky/whisper-large-khmer-asr
      - key: HF_API_TOKEN
        sync: false
      - key: TRANSFORMERS_MODEL
        value: seanghay/whisper-small-khmer
