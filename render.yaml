services:
  - type: web
    name: infinity-khmer-asr
    runtime: python
    region: singapore            # ជ្រើស region ជិតកម្ពុជា
    plan: free                   # Free tier

    buildCommand: >
      pip install torch==2.5.1+cpu torchaudio==2.5.1+cpu
      --index-url https://download.pytorch.org/whl/cpu
      --extra-index-url https://pypi.org/simple
      && pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120

    healthCheckPath: /health

    envVars:
      - key: HF_TOKEN
        sync: false              # ← set this in Render Dashboard (secret)

      - key: PYTHON_VERSION
        value: "3.11"

      - key: MAX_FILE_SIZE_MB
        value: "50"

      - key: CORS_ORIGINS
        value: "*"

      - key: TRANSFORMERS_CACHE
        value: /opt/render/.cache/huggingface

      - key: HF_HOME
        value: /opt/render/.cache/huggingface

      - key: TORCH_HOME
        value: /opt/render/.cache/torch

      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"

      - key: USE_TF
        value: "0"

      - key: TRANSFORMERS_NO_TF
        value: "1"

    disk:
      name: model-cache
      mountPath: /opt/render/.cache
      sizeGB: 10                 # cache Hugging Face model files
